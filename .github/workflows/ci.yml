name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install CPU torch + deps
        run: |
          python -m pip install --upgrade pip
          pip install "torch>=2.1.0" --index-url https://download.pytorch.org/whl/cpu
          pip install "numpy>=1.24" "pandas>=2.0" "mpmath>=1.3"

      - name: CI smoke (seeds, Morse, codon, neuron, failure catalog)
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: python scripts/ci_smoke.py

      - name: Language precision gates
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: python run_language_loop.py --verify-only
